<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <!-- Gradiente de fundo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <!-- Gradiente da pista -->
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <!-- Brilho título -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
    <!-- Gradiente kart azul -->
    <linearGradient id="kartBlueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#0288D1"/>
    </linearGradient>
    <!-- Gradiente kart vermelho -->
    <linearGradient id="kartRedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF5350"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
    <!-- Gradiente kart verde -->
    <linearGradient id="kartGreenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <!-- Filtro brilho -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Estrelas de fundo -->
  <circle cx="80" cy="40" r="2" fill="white" opacity="0.6"/>
  <circle cx="150" cy="80" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="220" cy="30" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="320" cy="60" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="450" cy="20" r="2" fill="white" opacity="0.5"/>
  <circle cx="580" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="680" cy="35" r="2" fill="white" opacity="0.4"/>
  <circle cx="780" cy="70" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="840" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="50" cy="150" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="870" cy="130" r="2" fill="white" opacity="0.5"/>
  <circle cx="120" cy="200" r="1" fill="white" opacity="0.6"/>
  <circle cx="760" cy="160" r="1.5" fill="white" opacity="0.4"/>

  <!-- Pista de corrida (oval) -->
  <ellipse cx="450" cy="340" rx="380" ry="200" fill="none" stroke="#4a4a4a" stroke-width="70"/>
  <ellipse cx="450" cy="340" rx="380" ry="200" fill="none" stroke="url(#trackGrad)" stroke-width="65"/>

  <!-- Linhas brancas da pista -->
  <ellipse cx="450" cy="340" rx="417" ry="232" fill="none" stroke="white" stroke-width="3" stroke-dasharray="30,20" opacity="0.7"/>
  <ellipse cx="450" cy="340" rx="343" ry="168" fill="none" stroke="white" stroke-width="3" stroke-dasharray="30,20" opacity="0.7"/>

  <!-- Grama central -->
  <ellipse cx="450" cy="340" rx="310" ry="130" fill="#1B5E20" opacity="0.8"/>
  <ellipse cx="450" cy="340" rx="295" ry="118" fill="#2E7D32" opacity="0.6"/>

  <!-- Linha de chegada / tabuleiro de xadrez -->
  <rect x="430" y="118" width="40" height="16" fill="white"/>
  <rect x="430" y="126" width="10" height="8" fill="black"/>
  <rect x="450" y="126" width="10" height="8" fill="black"/>
  <rect x="440" y="118" width="10" height="8" fill="black"/>
  <rect x="460" y="118" width="10" height="8" fill="black"/>

  <!-- ─── KART VERMELHO (frente) ─── -->
  <g transform="translate(300, 390)" filter="url(#shadow)">
    <!-- Sombra do kart -->
    <ellipse cx="35" cy="55" rx="38" ry="8" fill="black" opacity="0.4"/>
    <!-- Corpo principal -->
    <rect x="10" y="20" width="50" height="28" rx="8" fill="url(#kartRedGrad)"/>
    <!-- Asa dianteira -->
    <rect x="2" y="32" width="14" height="8" rx="3" fill="#C62828"/>
    <!-- Asa traseira -->
    <rect x="54" y="32" width="14" height="8" rx="3" fill="#C62828"/>
    <!-- Cockpit / capacete -->
    <ellipse cx="35" cy="22" rx="12" ry="9" fill="#B71C1C"/>
    <ellipse cx="35" cy="19" rx="9" ry="7" fill="#EF9A9A"/>
    <!-- Roda esquerda frente -->
    <ellipse cx="16" cy="48" rx="7" ry="7" fill="#333"/>
    <ellipse cx="16" cy="48" rx="4" ry="4" fill="#888"/>
    <!-- Roda esquerda trás -->
    <ellipse cx="54" cy="48" rx="8" ry="8" fill="#333"/>
    <ellipse cx="54" cy="48" rx="5" ry="5" fill="#888"/>
    <!-- Roda direita frente -->
    <ellipse cx="10" cy="40" rx="4" ry="7" fill="#333"/>
    <ellipse cx="10" cy="40" rx="2.5" ry="4" fill="#888"/>
    <!-- Roda direita trás -->
    <ellipse cx="60" cy="40" rx="5" ry="8" fill="#333"/>
    <ellipse cx="60" cy="40" rx="3" ry="5" fill="#888"/>
    <!-- Número -->
    <text x="35" y="36" text-anchor="middle" font-family="Arial Black" font-size="14" font-weight="900" fill="white">1</text>
    <!-- Rastro de velocidade -->
    <line x1="-10" y1="30" x2="8" y2="30" stroke="#FF9800" stroke-width="3" opacity="0.7"/>
    <line x1="-18" y1="38" x2="6" y2="38" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
    <line x1="-8" y1="45" x2="8" y2="45" stroke="#FF9800" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- ─── KART AZUL (meio) ─── -->
  <g transform="translate(440, 370)" filter="url(#shadow)">
    <ellipse cx="35" cy="55" rx="38" ry="8" fill="black" opacity="0.4"/>
    <rect x="10" y="20" width="50" height="28" rx="8" fill="url(#kartBlueGrad)"/>
    <rect x="2" y="32" width="14" height="8" rx="3" fill="#01579B"/>
    <rect x="54" y="32" width="14" height="8" rx="3" fill="#01579B"/>
    <ellipse cx="35" cy="22" rx="12" ry="9" fill="#0277BD"/>
    <ellipse cx="35" cy="19" rx="9" ry="7" fill="#B3E5FC"/>
    <ellipse cx="16" cy="48" rx="7" ry="7" fill="#333"/>
    <ellipse cx="16" cy="48" rx="4" ry="4" fill="#888"/>
    <ellipse cx="54" cy="48" rx="8" ry="8" fill="#333"/>
    <ellipse cx="54" cy="48" rx="5" ry="5" fill="#888"/>
    <ellipse cx="10" cy="40" rx="4" ry="7" fill="#333"/>
    <ellipse cx="10" cy="40" rx="2.5" ry="4" fill="#888"/>
    <ellipse cx="60" cy="40" rx="5" ry="8" fill="#333"/>
    <ellipse cx="60" cy="40" rx="3" ry="5" fill="#888"/>
    <text x="35" y="36" text-anchor="middle" font-family="Arial Black" font-size="14" font-weight="900" fill="white">2</text>
    <line x1="-10" y1="30" x2="8" y2="30" stroke="#E0F7FA" stroke-width="3" opacity="0.6"/>
    <line x1="-18" y1="38" x2="6" y2="38" stroke="#E0F7FA" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- ─── KART VERDE (atrás) ─── -->
  <g transform="translate(570, 385)" filter="url(#shadow)">
    <ellipse cx="35" cy="55" rx="38" ry="8" fill="black" opacity="0.4"/>
    <rect x="10" y="20" width="50" height="28" rx="8" fill="url(#kartGreenGrad)"/>
    <rect x="2" y="32" width="14" height="8" rx="3" fill="#1B5E20"/>
    <rect x="54" y="32" width="14" height="8" rx="3" fill="#1B5E20"/>
    <ellipse cx="35" cy="22" rx="12" ry="9" fill="#2E7D32"/>
    <ellipse cx="35" cy="19" rx="9" ry="7" fill="#C8E6C9"/>
    <ellipse cx="16" cy="48" rx="7" ry="7" fill="#333"/>
    <ellipse cx="16" cy="48" rx="4" ry="4" fill="#888"/>
    <ellipse cx="54" cy="48" rx="8" ry="8" fill="#333"/>
    <ellipse cx="54" cy="48" rx="5" ry="5" fill="#888"/>
    <ellipse cx="10" cy="40" rx="4" ry="7" fill="#333"/>
    <ellipse cx="10" cy="40" rx="2.5" ry="4" fill="#888"/>
    <ellipse cx="60" cy="40" rx="5" ry="8" fill="#333"/>
    <ellipse cx="60" cy="40" rx="3" ry="5" fill="#888"/>
    <text x="35" y="36" text-anchor="middle" font-family="Arial Black" font-size="14" font-weight="900" fill="white">3</text>
    <line x1="-10" y1="30" x2="8" y2="30" stroke="#E8F5E9" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Bandeirada de xadrez decorativa -->
  <g transform="translate(78, 100)" opacity="0.9">
    <rect x="0" y="0" width="12" height="12" fill="white"/>
    <rect x="12" y="0" width="12" height="12" fill="black"/>
    <rect x="0" y="12" width="12" height="12" fill="black"/>
    <rect x="12" y="12" width="12" height="12" fill="white"/>
    <rect x="0" y="24" width="12" height="12" fill="white"/>
    <rect x="12" y="24" width="12" height="12" fill="black"/>
  </g>
  <g transform="translate(800, 100)" opacity="0.9">
    <rect x="0" y="0" width="12" height="12" fill="black"/>
    <rect x="12" y="0" width="12" height="12" fill="white"/>
    <rect x="0" y="12" width="12" height="12" fill="white"/>
    <rect x="12" y="12" width="12" height="12" fill="black"/>
    <rect x="0" y="24" width="12" height="12" fill="black"/>
    <rect x="12" y="24" width="12" height="12" fill="white"/>
  </g>

  <!-- Decoração: troféu -->
  <g transform="translate(416, 290)" opacity="0.3">
    <text font-size="60" fill="#FFD700">🏆</text>
  </g>

  <!-- Faixa de título (topo) -->
  <rect x="0" y="0" width="900" height="105" fill="black" opacity="0.55" rx="0"/>

  <!-- Sombra do título -->
  <text x="454" y="68" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="70" font-weight="900"
    fill="#000000" opacity="0.5">🏎️ KART KIDS!</text>

  <!-- Título principal -->
  <text x="450" y="64" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="70" font-weight="900"
    fill="url(#titleGrad)"
    filter="url(#glow)"
    stroke="#FF5722" stroke-width="3">🏎️ KART KIDS!</text>

  <!-- Subtítulo -->
  <text x="450" y="95" text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="20" font-weight="bold"
    fill="#E0E0E0" opacity="0.9">Corrida Maluca Multiplayer em Tempo Real</text>

  <!-- Faixa inferior (info da escola) -->
  <rect x="0" y="530" width="900" height="70" fill="black" opacity="0.6"/>

  <!-- Linha decorativa superior da faixa -->
  <line x1="0" y1="530" x2="900" y2="530" stroke="#FFD700" stroke-width="2"/>

  <!-- Badge escola -->
  <rect x="30" y="542" width="280" height="46" rx="10" fill="#0f3460" stroke="#FFD700" stroke-width="2"/>
  <text x="170" y="560" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFD700">Escola São Francisco</text>
  <text x="170" y="578" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="12" fill="#E0E0E0">Luzerna — SC  •  Exposição de Projetos 2026</text>

  <!-- Tags de tecnologia -->
  <g transform="translate(370, 542)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#E53935" opacity="0.9"/>
    <text x="40" y="17" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Phaser.js</text>
  </g>
  <g transform="translate(462, 542)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#2E7D32" opacity="0.9"/>
    <text x="40" y="17" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Node.js</text>
  </g>
  <g transform="translate(554, 542)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#1565C0" opacity="0.9"/>
    <text x="50" y="17" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Socket.IO</text>
  </g>
  <g transform="translate(666, 542)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#6A1B9A" opacity="0.9"/>
    <text x="45" y="17" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Multiplayer</text>
  </g>

  <!-- Tags tech linha 2 -->
  <g transform="translate(370, 574)">
    <rect x="0" y="0" width="386" height="18" rx="5" fill="transparent"/>
    <text x="193" y="14" text-anchor="middle" font-family="Arial" font-size="12" fill="#B0BEC5">
      JavaScript  •  WebSocket  •  SQLite  •  Colyseus
    </text>
  </g>

  <!-- Ícones flutuantes decorativos -->
  <text x="30" y="200" font-size="30" opacity="0.15">⚡</text>
  <text x="840" y="200" font-size="30" opacity="0.15">⚡</text>
  <text x="55" y="500" font-size="24" opacity="0.15">🎮</text>
  <text x="820" y="500" font-size="24" opacity="0.15">🎮</text>
</svg>
